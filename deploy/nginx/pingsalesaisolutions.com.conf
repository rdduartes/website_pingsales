# Site estático PingSales AI Solutions — pingsalesaisolutions.com
# Não alterar outros vhosts; ficheiro isolado.

server {
    listen 80;
    listen [::]:80;
    server_name pingsalesaisolutions.com www.pingsalesaisolutions.com;

    root /home/ubuntu/website_pingsales/dist;
    index index.html;

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location = /index.html {
        if ($host = www.pingsalesaisolutions.com) {
            return 301 https://pingsalesaisolutions.com$request_uri;
        }
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    access_log /var/log/nginx/pingsalesaisolutions.com.access.log;
    error_log /var/log/nginx/pingsalesaisolutions.com.error.log;
}
